name: Build And Deploy Northflank

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: northflank-main
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  HAS_NORTHFLANK_CREDENTIALS: ${{ secrets.NORTHFLANK_CREDENTIALS_ID != '' }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Validate required secrets
        env:
          NORTHFLANK_API_KEY: ${{ secrets.NORTHFLANK_API_KEY }}
          NORTHFLANK_PROJECT_ID: ${{ secrets.NORTHFLANK_PROJECT_ID }}
          NORTHFLANK_SERVICE_ID: ${{ secrets.NORTHFLANK_SERVICE_ID }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          SMTP_CREDENTIALS_SECRET: ${{ secrets.SMTP_CREDENTIALS_SECRET }}
        run: |
          if [ -z "$NORTHFLANK_API_KEY" ] || [ -z "$NORTHFLANK_PROJECT_ID" ] || [ -z "$NORTHFLANK_SERVICE_ID" ] || [ -z "$JWT_SECRET" ] || [ -z "$SMTP_CREDENTIALS_SECRET" ]; then
            echo "NORTHFLANK_API_KEY, NORTHFLANK_PROJECT_ID, NORTHFLANK_SERVICE_ID, JWT_SECRET, and SMTP_CREDENTIALS_SECRET are required."
            exit 1
          fi

      - name: Configure Northflank Service Guardrails
        env:
          NORTHFLANK_API_KEY: ${{ secrets.NORTHFLANK_API_KEY }}
          NORTHFLANK_PROJECT_ID: ${{ secrets.NORTHFLANK_PROJECT_ID }}
          NORTHFLANK_SERVICE_ID: ${{ secrets.NORTHFLANK_SERVICE_ID }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          SMTP_CREDENTIALS_SECRET: ${{ secrets.SMTP_CREDENTIALS_SECRET }}
          CLIENT_PROD_ORIGIN: https://anas154.github.io
        run: node scripts/configure-northflank-service.mjs

      - name: Enforce Cost Policy
        env:
          NORTHFLANK_API_KEY: ${{ secrets.NORTHFLANK_API_KEY }}
          NORTHFLANK_PROJECT_ID: ${{ secrets.NORTHFLANK_PROJECT_ID }}
          NORTHFLANK_SERVICE_ID: ${{ secrets.NORTHFLANK_SERVICE_ID }}
        run: node scripts/enforce-cost-policy.mjs

      - name: Set image tags
        id: meta
        run: |
          owner="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          echo "image=ghcr.io/${owner}/marketpulse" >> "$GITHUB_OUTPUT"
          echo "sha_tag=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "main_tag=main" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.sha_tag }}
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.main_tag }}

      - name: Deploy to Northflank (without registry credentials)
        if: ${{ env.HAS_NORTHFLANK_CREDENTIALS == 'false' }}
        uses: northflank/deploy-to-northflank@v1
        with:
          northflank-api-key: ${{ secrets.NORTHFLANK_API_KEY }}
          project-id: ${{ secrets.NORTHFLANK_PROJECT_ID }}
          service-id: ${{ secrets.NORTHFLANK_SERVICE_ID }}
          image-path: ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.sha_tag }}

      - name: Deploy to Northflank (with registry credentials)
        if: ${{ env.HAS_NORTHFLANK_CREDENTIALS == 'true' }}
        uses: northflank/deploy-to-northflank@v1
        with:
          northflank-api-key: ${{ secrets.NORTHFLANK_API_KEY }}
          project-id: ${{ secrets.NORTHFLANK_PROJECT_ID }}
          service-id: ${{ secrets.NORTHFLANK_SERVICE_ID }}
          image-path: ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.sha_tag }}
          credentials-id: ${{ secrets.NORTHFLANK_CREDENTIALS_ID }}

      - name: Re-apply Northflank Runtime Guardrails
        env:
          NORTHFLANK_API_KEY: ${{ secrets.NORTHFLANK_API_KEY }}
          NORTHFLANK_PROJECT_ID: ${{ secrets.NORTHFLANK_PROJECT_ID }}
          NORTHFLANK_SERVICE_ID: ${{ secrets.NORTHFLANK_SERVICE_ID }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          SMTP_CREDENTIALS_SECRET: ${{ secrets.SMTP_CREDENTIALS_SECRET }}
          CLIENT_PROD_ORIGIN: https://anas154.github.io
        run: node scripts/configure-northflank-service.mjs

      - name: Verify Live Service
        env:
          NORTHFLANK_API_BASE_URL: ${{ secrets.NORTHFLANK_API_BASE_URL }}
        run: |
          if [ -z "$NORTHFLANK_API_BASE_URL" ]; then
            echo "NORTHFLANK_API_BASE_URL is required for live verification."
            exit 1
          fi
          curl --fail --silent --show-error --retry 12 --retry-delay 10 --retry-all-errors "$NORTHFLANK_API_BASE_URL/health"
          curl --fail --silent --show-error --retry 5 --retry-delay 5 --retry-all-errors "$NORTHFLANK_API_BASE_URL/api/bootstrap" > /tmp/bootstrap.json
          node -e "const fs=require('fs'); const data=JSON.parse(fs.readFileSync('/tmp/bootstrap.json','utf8')); if(!Array.isArray(data.instruments)){throw new Error('bootstrap instruments missing')} console.log('Live bootstrap verified:', data.instruments.length, 'instruments')"
