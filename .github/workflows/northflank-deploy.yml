name: Build And Deploy Northflank

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: northflank-main
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  HAS_NORTHFLANK_CREDENTIALS: ${{ secrets.NORTHFLANK_CREDENTIALS_ID != '' }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Enforce Cost Policy
        env:
          NORTHFLANK_API_KEY: ${{ secrets.NORTHFLANK_API_KEY }}
          NORTHFLANK_PROJECT_ID: ${{ secrets.NORTHFLANK_PROJECT_ID }}
          NORTHFLANK_SERVICE_ID: ${{ secrets.NORTHFLANK_SERVICE_ID }}
        run: node scripts/enforce-cost-policy.mjs

      - name: Validate required secrets
        env:
          NORTHFLANK_API_KEY: ${{ secrets.NORTHFLANK_API_KEY }}
          NORTHFLANK_PROJECT_ID: ${{ secrets.NORTHFLANK_PROJECT_ID }}
          NORTHFLANK_SERVICE_ID: ${{ secrets.NORTHFLANK_SERVICE_ID }}
        run: |
          if [ -z "$NORTHFLANK_API_KEY" ] || [ -z "$NORTHFLANK_PROJECT_ID" ] || [ -z "$NORTHFLANK_SERVICE_ID" ]; then
            echo "NORTHFLANK_API_KEY, NORTHFLANK_PROJECT_ID, and NORTHFLANK_SERVICE_ID are required."
            exit 1
          fi

      - name: Set image tags
        id: meta
        run: |
          owner="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          echo "image=ghcr.io/${owner}/marketpulse" >> "$GITHUB_OUTPUT"
          echo "sha_tag=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "main_tag=main" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.sha_tag }}
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.main_tag }}

      - name: Deploy to Northflank (without registry credentials)
        if: ${{ env.HAS_NORTHFLANK_CREDENTIALS == 'false' }}
        uses: northflank/deploy-to-northflank@v1
        with:
          northflank-api-key: ${{ secrets.NORTHFLANK_API_KEY }}
          project-id: ${{ secrets.NORTHFLANK_PROJECT_ID }}
          service-id: ${{ secrets.NORTHFLANK_SERVICE_ID }}
          image-path: ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.sha_tag }}

      - name: Deploy to Northflank (with registry credentials)
        if: ${{ env.HAS_NORTHFLANK_CREDENTIALS == 'true' }}
        uses: northflank/deploy-to-northflank@v1
        with:
          northflank-api-key: ${{ secrets.NORTHFLANK_API_KEY }}
          project-id: ${{ secrets.NORTHFLANK_PROJECT_ID }}
          service-id: ${{ secrets.NORTHFLANK_SERVICE_ID }}
          image-path: ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.sha_tag }}
          credentials-id: ${{ secrets.NORTHFLANK_CREDENTIALS_ID }}
